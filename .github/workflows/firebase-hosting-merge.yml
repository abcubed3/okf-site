name: Deploy to Firebase Hosting and Cloud Run on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_OKFGO_2600D }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy Cloud Run Telemetry Proxy
        working-directory: functions
        run: |
          gcloud run deploy telemetry \
            --source . \
            --region us-east4 \
            --allow-unauthenticated \
            --set-env-vars GA_MEASUREMENT_ID=${{ secrets.GA_MEASUREMENT_ID }},GA_API_SECRET=${{ secrets.GA_API_SECRET }}

      - run: |
          mkdir -p public
          cp -r index.html style.css app.js *.png *.jpg *.jpeg *.svg *.ico *.webmanifest public/ 2>/dev/null || true
          curl -sSfL https://raw.githubusercontent.com/abcubed3/okf/main/install.sh -o public/install.sh
      
      - uses: FirebaseExtended/action-hosting-deploy@v0.11.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OKFGO_2600D }}
          channelId: live
          projectId: okfgo-2600d
