name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: mkdir -p public && cp -r index.html style.css app.js *.png *.jpg *.jpeg *.svg *.ico *.webmanifest public/ 2>/dev/null || true
      - uses: FirebaseExtended/action-hosting-deploy@v0.6-alpha
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OKFGO_2600D }}
          channelId: live
          projectId: okfgo-2600d
